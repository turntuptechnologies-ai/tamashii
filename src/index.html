<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tamashii</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }
  </style>
</head>
<body>
  <canvas id="pet" width="200" height="200"></canvas>
  <script type="module" src="renderer.js"></script>
</body>
</html>
